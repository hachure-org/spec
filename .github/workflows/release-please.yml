name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Prefer a token minted from the org's release-bot app (release PRs
      # authored by the default GITHUB_TOKEN get their CI runs held as
      # action_required on every refresh). Falls back to GITHUB_TOKEN when the
      # app is not configured for this org — install the app and set
      # RELEASE_APP_ID (variable) + RELEASE_APP_PRIVATE_KEY (secret) to
      # upgrade. See kontourai/flow-agents#38 for the background.
      - name: Mint app token
        id: app-token
        if: vars.RELEASE_APP_ID != ''
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Tags created with GITHUB_TOKEN do not trigger tag-push workflows, so
      # dispatch the existing publish pipeline at the new tag explicitly.
      - name: Dispatch publish workflow
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-npm.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.release.outputs.tag_name }}"
